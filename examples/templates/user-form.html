<form class="user-form"
      xh-put="/api/users/{{id}}"
      xh-target="#user-list-container"
      xh-swap="innerHTML">
  <h3>Edit User #<span xh-text="id"></span></h3>
  <div class="form-group">
    <label>Name</label>
    <input type="text" name="name" xh-attr-value="name" required>
  </div>
  <div class="form-group">
    <label>Email</label>
    <input type="email" name="email" xh-attr-value="email" required>
  </div>
  <div class="form-group">
    <label>
      <input type="checkbox" name="is_admin" xh-attr-checked="is_admin"> Admin
    </label>
  </div>
  <div class="form-actions">
    <button type="submit" class="btn btn-primary">Save Changes</button>
    <button type="button" class="btn" onclick="document.getElementById('edit-form').innerHTML='';">Cancel</button>
  </div>
  <span class="xh-indicator">Saving...</span>
</form>
