name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm --version
      - run: node --version
      - run: npm run check
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - name: Verify package contents
        run: npm pack --dry-run
      - name: Publish with OIDC trusted publisher
        run: |
          # Ensure npm is new enough for OIDC (>=11.5.1)
          npm install -g npm@latest
          npm --version
          # Remove placeholder token from setup-node
          sed -i '/_authToken/d' $NPM_CONFIG_USERCONFIG 2>/dev/null || true
          npm publish --provenance --access public
